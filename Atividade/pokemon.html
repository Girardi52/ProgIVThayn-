<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pokédex Explorer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Press+Start+2P&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>


<body>

<header class="banner">

    <h1>Pokédex</h1>

    <p>
        Explore seus Pokémon favoritos
    </p>

</header>



<section class="controls">

    <input 
        id="searchInput"
        type="text"
        placeholder="Digite nome ou número..."
        aria-label="Pesquisar Pokémon"
    >


    <button 
        id="searchButton"
        class="btn-search">
        Buscar
    </button>



    <select 
        id="typeFilter"
        aria-label="Filtrar por tipo">

        <option value="">
            Todos os tipos
        </option>

        <option value="fire">
            Fogo
        </option>

        <option value="water">
            Água
        </option>

        <option value="grass">
            Planta
        </option>

        <option value="electric">
            Elétrico
        </option>

        <option value="ice">
            Gelo
        </option>

        <option value="fighting">
            Lutador
        </option>

        <option value="poison">
            Venenoso
        </option>

        <option value="ground">
            Terra
        </option>

        <option value="flying">
            Voador
        </option>

        <option value="psychic">
            Psíquico
        </option>

        <option value="bug">
            Inseto
        </option>

        <option value="rock">
            Pedra
        </option>

        <option value="ghost">
            Fantasma
        </option>

        <option value="dragon">
            Dragão
        </option>

        <option value="dark">
            Sombrio
        </option>

        <option value="steel">
            Aço
        </option>

        <option value="fairy">
            Fada
        </option>

    </select>


</section>




<main>

    <div 
        id="loader"
        class="loader">
        Carregando Pokémon...
    </div>


    <section 
        id="pokemonGrid"
        class="grid">

    </section>


</main>




<script src="script.js"></script>


</body>

</html>
